services:
  postgres:
    image: postgres:16-alpine
    container_name: swiftparcel-postgres
    environment:
      POSTGRES_DB: swiftparcel
      POSTGRES_USER: swiftparcel
      POSTGRES_PASSWORD: swiftparcel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: swiftparcel-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
